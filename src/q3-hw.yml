name: HomeWork

on: push

jobs:
  question-3:
    runs-on: ubuntu-latest

    steps:
      - name: Print Server Health Report
        run: |
          echo "📊 SERVER HEALTH REPORT"
          echo ""
          echo "Disk Usage:"
          df -h / | awk 'NR==2 {print $5}'
          echo ""
          echo "Memory Available:"
          free -h | awk '/Mem:/ {print $7 " available"}'
          echo ""
          echo "CPU Cores:"
          nproc
          echo ""
          echo "Node Version:"
          node -v
          echo ""
          echo "Python Version:"
          python3 --version
          echo ""
          echo "Health Status:"
          echo "✅ HEALTHY"