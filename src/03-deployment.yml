name: Calculator Deployment

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: node src/calculator.test.js

      - if: success()
        run: echo "✅ Ready for deployment"

      - if: failure()
        run: echo "❌ Deployment blocked because tests failed"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Deploying application..."
